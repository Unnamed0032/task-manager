<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Task Manager</h1>
        {% if tasks %}
            {% for task in tasks %}
                <p>{{loop.index}}. {{task[1]}} [<a href="/remove_task/{{task[0]}}">remove</a>] [<a href="/edit_task/{{task[0]}}">edit</a>]</p>
            {% endfor %}
        {% else %}
            <p>There is no tasks.</p>
        {% endif %}
        <a href="/add_task">add task</a><br>
        <a href="/dashboard">back</a>

</body>
</html>
